---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: zhuzh-job-db-cleaner
spec:
  concurrencyPolicy: Replace
  schedule: "0 0 1,8,15,22 * *" # At midnight on day-of-month 1, 8, 15, and 22.”
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: db-cleaner
              image: zhuzh-job-db-cleaner
              imagePullPolicy: Always
              env:
                - name: "CONFIGURATION_FILEPATH"
                  value: "/etc/service-config.json"
                - name: "RUNNING_IN_KUBERNETES"
                  value: "true"
                - name: "ZHUZH_OBSERVABILITY_METRICS_OTEL_SERVICE_NAME"
                  value: "zhuzh_job_db_cleaner"
                - name: "ZHUZH_OBSERVABILITY_TRACING_TRACING_SERVICE_NAME"
                  value: "zhuzh_job_db_cleaner"
              volumeMounts:
                - name: "config"
                  mountPath: "/etc/service-config.json"
                  subPath: "config.json"
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
          volumes:
            - name: "config"
              configMap:
                name: "zhuzh-job-db-cleaner-config"
---
